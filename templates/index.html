<!DOCTYPE html>
<html>
<head>
    <title>Hand Gesture Control</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background: rgba(0,0,0,0.4);
            padding: 30px;
            margin: auto;
            width: 50%;
            border-radius: 15px;
            box-shadow: 0 0 20px black;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .start {
            background: #00c853;
            color: white;
        }

        .start:hover {
            background: #00e676;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🖐 Hand Gesture Control System</h1>
    <p>AI-based gesture recognition project</p>

    <a href="/start">
        <button class="start">Start Project</button>
    </a>
</div>

</body>
</html>
